<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Security Notification</title>
    </head>
    <body style="font-family: Arial, Helvetica, sans-serif; background-color: #ecfdf5; margin: 0; padding: 24px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
            <tr>
                <td align="center">
                    <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius: 14px; padding: 28px; border: 1px solid #d1fae5;">
                        <tr>
                            <td>
                                <div style="display:inline-block; padding: 6px 12px; background: #dcfce7; color: #166534; border-radius: 999px; font-size: 12px; font-weight: 600; margin-bottom: 12px;">
                                    Mediflow Security Alert
                                </div>
                                <h2 style="margin: 0 0 12px 0; color: #065f46;">{$securityTitle}</h2>
                                <p style="margin: 0 0 16px 0; color: #0f172a;">Hi {$userName},</p>
                                <p style="margin: 0 0 24px 0; color: #0f172a;">{$securityMessage}</p>
                                <div style="padding: 16px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; color: #166534;">
                                    If this was not you, please contact {$supportEmail} as soon as possible.
                                </div>
                                <p style="margin: 24px 0 0 0; color: #94a3b8; font-size: 12px;">{$date} · © {$year} Mediflow Health Center</p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
